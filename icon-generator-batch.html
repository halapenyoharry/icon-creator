<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Repo Icon Generator (Batch)</title>
  <style>
    body { background: #181818; color: #eee; font-family: monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; }
    #controls { background: #222; padding: 16px 24px; border-radius: 10px; margin: 32px 0 16px 0; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    label { font-size: 12px; color: #c8a050; margin-right: 6px; }
    input, select { background: #181818; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-size: 13px; }
    button { background: #c8a050; color: #181818; border: none; border-radius: 4px; padding: 6px 16px; font-weight: bold; cursor: pointer; font-size: 13px; }
    button:hover { background: #ddb060; }
    #gallery { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-bottom: 32px; }
    .icon-wrap { display: flex; flex-direction: column; align-items: center; }
    canvas { background: #111; border-radius: 12px; box-shadow: 0 0 32px #000a; margin-bottom: 8px; }
    .export-btn { margin-top: 2px; font-size: 11px; padding: 2px 8px; }
  </style>
</head>
<body>
  <div id="controls">
    <label>Repo:</label>
    <input id="repo" value="halapenyoharry/icon-creator" style="width:200px">
    <label>Seed:</label>
    <input id="seed" type="number" value="42" min="1" max="99999" style="width:70px">
    <label>Layers:</label>
    <select id="layers" multiple size="3" style="width:120px">
      <option value="crystalline" selected>Crystalline</option>
      <option value="growth" selected>Growth</option>
      <option value="topological">Topological</option>
    </select>
    <label>Count:</label>
    <input id="count" type="number" value="16" min="1" max="1024" style="width:60px">
    <label>Preview Size:</label>
    <input id="preview" type="number" value="128" min="32" max="512" style="width:60px">
    <label>Export Size:</label>
    <input id="exportsize" type="number" value="512" min="32" max="2048" style="width:70px">
    <button onclick="generateBatch()">Generate</button>
  </div>
  <div id="gallery"></div>
  <script>
    function hashString(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
      return Math.abs(h) % 100000;
    }
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }
    const Layers = {
      crystalline: (ctx, w, h, rng) => {
        for(let i=0; i<8; i++) {
          const cx = rng()*w, cy = rng()*h, r = 40 + rng()*80;
          const poly = [];
          for(let a=0; a<Math.PI*2; a+=Math.PI/3) poly.push({x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r});
          drawFacet(ctx, poly, 0, 2 + Math.floor(rng()*2), rng);
        }
        function drawFacet(ctx, poly, d, maxD, rng) {
          if (d > maxD) {
            ctx.beginPath(); ctx.moveTo(poly[0].x, poly[0].y);
            poly.forEach(pt => ctx.lineTo(pt.x, pt.y)); ctx.closePath();
            ctx.fillStyle = `hsl(${200 + rng() * 40}, 30%, ${70 + rng() * 20}%)`;
            ctx.globalAlpha = 0.7;
            ctx.fill(); ctx.globalAlpha = 1;
            ctx.strokeStyle = `rgba(0,0,0,0.15)`; ctx.stroke();
            return;
          }
          const mid = poly.reduce((a,b) => ({x:a.x+b.x, y:a.y+b.y}), {x:0,y:0});
          mid.x /= poly.length; mid.y /= poly.length;
          mid.x += (rng()-0.5) * 16; mid.y += (rng()-0.5) * 16;
          for(let i=0; i<poly.length; i++) drawFacet(ctx, [poly[i], poly[(i+1)%poly.length], mid], d+1, maxD, rng);
        }
      },
      growth: (ctx, w, h, rng) => {
        for(let i=0; i<6; i++) {
          const x = rng()*w, y = rng()*h;
          ctx.fillStyle = `hsl(${rng()*360}, 60%, 55%)`;
          ctx.globalAlpha = 0.18 + rng()*0.18;
          ctx.beginPath(); ctx.arc(x, y, 40 + rng()*60, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
        }
      },
      topological: (ctx, w, h, rng) => {
        for(let i=0; i<3; i++) {
          const x = rng()*w, y = rng()*h, r = 60 + rng()*60;
          ctx.strokeStyle = `rgba(200, 180, 150, 0.25)`;
          ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x-r, y); ctx.lineTo(x+r, y); ctx.stroke();
        }
      }
    };
    function generateBatch() {
      const repo = document.getElementById('repo').value.trim();
      const seedInput = parseInt(document.getElementById('seed').value);
      const layersSel = document.getElementById('layers');
      const selectedLayers = Array.from(layersSel.selectedOptions).map(o => o.value);
      const count = Math.min(1024, Math.max(1, parseInt(document.getElementById('count').value)));
      const previewSize = Math.max(32, Math.min(512, parseInt(document.getElementById('preview').value)));
      const exportSize = Math.max(32, Math.min(2048, parseInt(document.getElementById('exportsize').value)));
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      for(let i=0; i<count; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'icon-wrap';
        const canvas = document.createElement('canvas');
        canvas.width = previewSize;
        canvas.height = previewSize;
        const repoSeed = hashString(repo) + seedInput + i*9973;
        const rng = mulberry32(repoSeed);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        selectedLayers.forEach(layer => {
          if (Layers[layer]) Layers[layer](ctx, canvas.width, canvas.height, rng);
        });
        wrap.appendChild(canvas);
        const btn = document.createElement('button');
        btn.className = 'export-btn';
        btn.textContent = 'Export';
        btn.onclick = () => exportIcon(selectedLayers, repo, seedInput, i, exportSize);
        wrap.appendChild(btn);
        gallery.appendChild(wrap);
      }
    }
    function exportIcon(selectedLayers, repo, seedInput, idx, exportSize) {
      const repoSeed = hashString(repo) + seedInput + idx*9973;
      const rng = mulberry32(repoSeed);
      const canvas = document.createElement('canvas');
      canvas.width = exportSize;
      canvas.height = exportSize;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      selectedLayers.forEach(layer => {
        if (Layers[layer]) Layers[layer](ctx, canvas.width, canvas.height, rng);
      });
      const link = document.createElement('a');
      link.download = `icon_${repo.replace(/\W/g,'_')}_${seedInput}_${idx}_${exportSize}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    window.onload = generateBatch;
  </script>
</body>
</html>
